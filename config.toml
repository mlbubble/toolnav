relativeURLs = true
# baseURL               = "none"
languageCode          = "zh-CN"
title                 = "泡泡的工具箱"
theme                 = "WebStack-Hugo"
preserveTaxonomyNames = true
disablePathToLower    = true
hasCJKLanguage        = true
publishDir            = "docs"				# 站点静态文件保存目录


[params]
    author        = "mlbubble"
    description   = "一个乱七八糟的导航站"
    repository    = "https://github.com/shenweiyan/WebStack-Hugo"  
    enablePreLoad = true					# 网站完全打开前预加载动画
    expandSidebar = false					# 默认展开左侧边导航栏
    logosPath     = "assets/images/logos"			# 网站每个导航地址logo存放地址
    defaultLogo   = "assets/images/logos/default.webp"		# logo图片资源不存在或者错误时, 默认显示的logo; 该参数如为空,将会一直加载对应的logo,直至成功
    nightMode     = false					# 默认站点为深色(夜间)模式
    yiyan         = true                  	# 默认启用一言服务
    fancybox      = true                # 使用 Fancybox 实现图片灯箱/放大功能



[params.images]
    favicon           = "assets/image/minilogo.png"
    searchImageL      = "assets/image/searchbg2.png"		# 搜索部分浅色背景图
    searchImageD      = "assets/image/searchbg2.png"		# 搜索部分深色背景图
    logoExpandLight   = "assets/image/sidebarlogo.png"
    logoExpandDark    = "assets/image/sidebarlogo.png"
    logoCollapseLight = "assets/image/minilogo.png"
    logoCollapseDark  = "assets/image/minilogo.png"
    
[markup.goldmark.renderer]
    unsafe = true

[params.footer]
    copyright = '&copy; 2024 - {year} 泡泡的工具箱 by mlbubble'
